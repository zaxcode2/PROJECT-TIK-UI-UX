<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Lab Dice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="dice">
  <div id="appLoader" class="app-loader"><div class="loader-ring"></div></div>
  <div class="bg-noise"></div>
  <div class="bg-glow glow-left"></div>
  <div class="bg-glow glow-right"></div>

  <header class="topbar reveal">
    <div class="brand">
      <span class="brand-dot"></span>
      <div>
        <p class="tag">Virtual Credits Only</p>
        <h1>Arcade Lab</h1>
      </div>
    </div>

    <nav class="navlinks" aria-label="Main navigation">
      <a class="navlink" href="index.html">Dashboard</a>
      <div class="nav-games open">
        <button type="button" class="navlink nav-games-btn active" aria-expanded="true">Games</button>
        <div class="nav-games-menu">
          <a class="nav-games-link" href="game.html">Game Floor</a>
          <a class="nav-games-link" href="slot.html">Slot</a>
          <a class="nav-games-link active" href="dice.html">Dice</a>
          <a class="nav-games-link" href="mines.html">Mines</a>
          <a class="nav-games-link" href="wheel.html">Wheel</a>
          <a class="nav-games-link" href="chicken.html">Chicken</a>
          <a class="nav-games-link" href="plinko.html">Plinko</a>
        </div>
      </div>
    </nav>
    <div class="top-actions">
      <a id="userBadge" class="user-badge" href="profile.html"></a>
      <button id="logoutBtn" type="button" class="btn btn-ghost small">Logout</button>
    </div>
  </header>

  <main class="shell">
    <section class="hero reveal compact">
      <p class="eyebrow">Dice Arena</p>
      <h2>Dedicated dice page.</h2>
    </section>

    <section class="grid game-grid">
      <article class="panel controls reveal">
        <h3>Wallet + Bet</h3>
        <p id="balance" class="value">1000</p>
        <label for="betAmount">Bet Amount</label>
        <input id="betAmount" type="number" min="10" step="10" value="50" />
        <p class="hint">Roll high (5-6) to win.</p>
        <div class="actions-col">
          <button id="topupBtn" type="button" class="btn btn-solid">+250 Credits</button>
          <button id="resetBtn" type="button" class="btn btn-ghost">Reset Wallet</button>
        </div>
      </article>

      <article class="panel game-card reveal">
        <h3>Dice</h3>
        <div class="dice-stage">
          <div id="dice3d" class="dice-cube" aria-label="3D dice">
            <div class="face front">
              <span class="pip center"></span>
            </div>
            <div class="face back">
              <span class="pip tl"></span><span class="pip tr"></span>
              <span class="pip bl"></span><span class="pip br"></span>
              <span class="pip center"></span>
            </div>
            <div class="face right">
              <span class="pip tl"></span><span class="pip tr"></span>
              <span class="pip center"></span>
              <span class="pip bl"></span><span class="pip br"></span>
            </div>
            <div class="face left">
              <span class="pip tl"></span><span class="pip tr"></span>
              <span class="pip bl"></span><span class="pip br"></span>
            </div>
            <div class="face top">
              <span class="pip tl"></span><span class="pip tr"></span><span class="pip ml"></span>
              <span class="pip mr"></span><span class="pip bl"></span><span class="pip br"></span>
            </div>
            <div class="face bottom">
              <span class="pip tl"></span><span class="pip br"></span>
            </div>
          </div>
        </div>
        <p id="diceResultText" class="game-substatus">Press roll to throw the dice.</p>
        <button id="rollBtn" type="button" class="btn btn-solid wide">Roll</button>
      </article>

      <article class="panel history reveal">
        <div class="panel-head">
          <h3>Recent Rounds</h3>
          <button id="clearLogBtn" type="button" class="btn btn-ghost small">Clear</button>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </article>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
