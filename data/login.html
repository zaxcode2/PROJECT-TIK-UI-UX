<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Lab Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <main class="auth-wrap">
    <section class="auth-card">
      <h1 id="modeLabel">Welcome Back</h1>
      <p class="auth-sub">Secure login backed by SQLite database.</p>

      <form id="authForm" class="auth-form">
        <div id="usernameWrap" style="display:none">
          <label for="username">Username</label>
          <input id="username" type="text" minlength="3" maxlength="24" />
        </div>

        <label for="email">Email</label>
        <input id="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" minlength="6" required />

        <button id="submitBtn" type="submit" class="btn btn-solid wide">Sign In</button>
      </form>

      <p id="authMessage" class="auth-error"></p>
      <button id="toggleModeBtn" type="button" class="btn btn-ghost wide">New here? Create account</button>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
