<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Lab Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile">
  <div id="appLoader" class="app-loader"><div class="loader-ring"></div></div>
  <div class="bg-noise"></div>
  <div class="bg-glow glow-left"></div>
  <div class="bg-glow glow-right"></div>

  <header class="topbar reveal">
    <div class="brand">
      <span class="brand-dot"></span>
      <div>
        <p class="tag">Virtual Credits Only</p>
        <h1>Arcade Lab</h1>
      </div>
    </div>

    <nav class="navlinks" aria-label="Main navigation">
      <a class="navlink" href="index.html">Dashboard</a>
      <div class="nav-games">
        <button type="button" class="navlink nav-games-btn" aria-expanded="false">Games</button>
        <div class="nav-games-menu">
          <a class="nav-games-link" href="game.html">Game Floor</a>
          <a class="nav-games-link" href="slot.html">Slot</a>
          <a class="nav-games-link" href="dice.html">Dice</a>
          <a class="nav-games-link" href="mines.html">Mines</a>
          <a class="nav-games-link" href="wheel.html">Wheel</a>
          <a class="nav-games-link" href="chicken.html">Chicken</a>
          <a class="nav-games-link" href="plinko.html">Plinko</a>
        </div>
      </div>
    </nav>
    <div class="top-actions">
      <a id="userBadge" class="user-badge" href="profile.html"></a>
      <button id="logoutBtn" type="button" class="btn btn-ghost small">Logout</button>
    </div>
  </header>

  <main class="shell">
    <section class="hero reveal compact">
      <p class="eyebrow">Profile Area</p>
      <h2>Manage your account details and security.</h2>
    </section>

    <section class="grid profile-grid">
      <article class="panel profile-card reveal">
        <div class="panel-head">
          <h3>Account</h3>
          <span id="profileSaved" class="profile-saved"></span>
        </div>

        <form id="profileForm" class="profile-form">
          <label for="profileUsername">Username</label>
          <input id="profileUsername" type="text" minlength="3" maxlength="24" required />

          <label for="profileEmail">Email</label>
          <input id="profileEmail" type="email" required />

          <label for="profileAvatar">Avatar URL (optional)</label>
          <input id="profileAvatar" type="url" placeholder="https://example.com/avatar.png" />

          <label for="profileBio">Bio (optional)</label>
          <textarea id="profileBio" maxlength="180" rows="4" placeholder="Short intro..."></textarea>

          <label for="currentPassword">Current Password (required to change password)</label>
          <input id="currentPassword" type="password" minlength="6" />

          <label for="newPassword">New Password (optional)</label>
          <input id="newPassword" type="password" minlength="6" />

          <button type="submit" class="btn btn-solid wide">Save Changes</button>
          <p id="profileMessage" class="profile-message"></p>
        </form>
      </article>

      <article class="panel profile-preview reveal">
        <h3>Preview</h3>
        <div class="preview-card">
          <img id="avatarPreview" class="avatar-preview" alt="Profile avatar preview" />
          <h4 id="previewName">Your Name</h4>
          <p id="previewEmail">email@example.com</p>
          <p id="previewBio" class="preview-bio">No bio yet.</p>
        </div>
      </article>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script src="profile.js"></script>
</body>
</html>
